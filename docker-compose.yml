services:
  discord-soundboard:
    build: .
    container_name: local-soundboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./sounds:/usr/src/app/sounds
      - ./data:/usr/src/app/data
    env_file:
      - .env

  # TTS service (optional, requires NVIDIA GPU)
