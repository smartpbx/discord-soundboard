<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Watch Together</title>
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #18181c;
            --surface-hover: #1f1f24;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --border: #2a2a30;
            --accent: #7c3aed;
            --danger: #dc2626;
            --radius: 10px;
            --live: #2ee06a;
            --live-tint: rgba(46,224,106,0.13);
            --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            --elev-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 2px 5px rgba(0,0,0,0.45);
            --press: inset 0 3px 8px rgba(0,0,0,0.55);
            --accent-text: #fff;
            --warning: #f59e0b;
        }
        .watch-meta, .sync-pill, .vp-time { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .watch-shell { display: flex; flex-direction: column; height: 100dvh; background: var(--bg); isolation: isolate; }
        .watch-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--elev-1); flex-wrap: wrap; position: relative; z-index: 2; }
        .watch-title { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.01em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .watch-meta { font-size: 0.78rem; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 0.2rem 0.55rem; box-shadow: var(--press); }
        .watch-badge { padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
        .watch-badge.host { background: rgba(124,58,237,0.2); color: var(--accent); border: 1px solid var(--accent); }
        .watch-badge.viewer { background: var(--surface-hover); color: var(--text-muted); border: 1px solid var(--border); }
        .watch-stage { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; background: black; position: relative; }
        .watch-stage > .player-frame { width: 100%; height: 100%; border: 0; }
        .watch-stage video { width: 100%; height: 100%; background: black; }
        .watch-stage .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1rem;
            background: rgba(0,0,0,0.72); color: var(--text); text-align: center; padding: 1rem;
        }
        .watch-stage .overlay.hidden { display: none; }
        .watch-stage .overlay-card { width: min(100%, 520px); padding: 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--elev-1), 0 18px 45px rgba(0,0,0,0.5); }
        .watch-stage .overlay h2 { margin: 0; font-size: 1.2rem; }
        .watch-stage .overlay p { margin: 0.65rem auto 0; color: var(--text-muted); max-width: 480px; }
        .btn { padding: 0.55rem 1rem; font-size: 0.9rem; font-weight: 600; border-radius: 8px; border: 1px solid var(--border); background: linear-gradient(180deg, var(--surface-hover), var(--surface)); color: var(--text); cursor: pointer; box-shadow: var(--elev-1); transition: transform 0.06s ease, box-shadow 0.12s ease; }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
        .btn.danger { background: var(--danger); border-color: var(--danger); color: var(--accent-text); }
        .btn:active:not(:disabled) { transform: translateY(1px); box-shadow: var(--press); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .controls { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .controls.hidden { display: none; }
        .status-line { font: 0.78rem/1.3 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-muted); padding: 0.55rem 1rem; background: var(--surface); border-top: 1px solid var(--border); box-shadow: 0 -2px 7px rgba(0,0,0,0.28); display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; position: relative; z-index: 2; }
        .status-line .sep { color: var(--border); }
        .sync-pill { display: inline-flex; align-items: center; gap: 0.4rem; min-height: 1.55rem; padding: 0.18rem 0.6rem; border: 1px solid var(--border); border-radius: 999px; background: var(--surface-hover); color: var(--text-muted); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.035em; text-transform: uppercase; }
        .sync-pill::before { content: ''; width: 0.48rem; height: 0.48rem; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .sync-pill.is-live { color: var(--live); border-color: var(--live); background: var(--live-tint); }
        .sync-pill.is-live::before { box-shadow: 0 0 0.6rem var(--live); animation: livePulse 1.8s ease-in-out infinite; }
        .sync-pill.is-warning { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 55%, var(--border)); background: color-mix(in srgb, var(--warning) 10%, var(--surface)); }
        .viewer-pills { display: inline-flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }
        .viewer-pill { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.18rem 0.55rem; border-radius: 999px; font: 600 0.72rem/1.2 var(--font-mono); font-variant-numeric: tabular-nums; background: var(--surface-hover); border: 1px solid var(--border); color: var(--text); box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset; }
        .viewer-pill .vp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); box-shadow: 0 0 0.35rem color-mix(in srgb, var(--live) 70%, transparent); flex-shrink: 0; }
        .viewer-pill.role-superadmin { border-color: rgba(124,58,237,0.5); color: var(--accent); }
        .viewer-pill.role-admin { border-color: rgba(124,58,237,0.3); }
        .viewer-pill.role-guest { color: var(--text-muted); }
        .viewer-pill.role-superadmin .vp-dot, .viewer-pill.role-admin .vp-dot { background: var(--accent); box-shadow: 0 0 0.35rem color-mix(in srgb, var(--accent) 70%, transparent); }
        .viewer-pill.role-guest .vp-dot { background: var(--text-muted); box-shadow: none; }
        .viewer-pill.is-host { border-color: var(--accent); }
        .viewer-pill.is-host .vp-dot { background: var(--accent); }
        .viewer-pill.is-me { box-shadow: 0 0 0 1px rgba(124,58,237,0.35); }
        .toast {
            position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
            background: var(--surface); color: var(--text); padding: 0.55rem 1rem;
            border: 1px solid var(--accent); border-radius: var(--radius); font: 600 0.8rem/1.3 var(--font-mono); box-shadow: var(--elev-1), 0 8px 24px rgba(0,0,0,0.48);
            opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100;
        }
        .toast.visible { opacity: 1; }
        @keyframes livePulse { 50% { opacity: 0.58; box-shadow: 0 0 0.25rem var(--live); } }
        @media (prefers-reduced-motion: reduce) {
            .btn, .toast { transition: none; }
            .sync-pill.is-live::before { animation: none; }
        }
    </style>
</head>
<body>
    <div class="watch-shell">
        <div class="watch-bar">
            <span class="watch-title" id="watchTitle">Loading room…</span>
            <span class="watch-meta" id="watchMeta"></span>
            <span class="watch-badge viewer" id="watchRoleBadge" title="Resolving role…">Connecting…</span>
            <div class="controls hidden" id="watchControls">
                <button type="button" class="btn primary" id="btnPlay">▶ Play</button>
                <button type="button" class="btn" id="btnPause">⏸ Pause</button>
                <button type="button" class="btn" id="btnSync">↻ Resync</button>
                <button type="button" class="btn" id="btnPickAnother">🎬 Pick another</button>
                <button type="button" class="btn danger" id="btnClose">✕ Close room</button>
            </div>
        </div>
        <div class="watch-stage" id="watchStage">
            <div class="overlay" id="watchOverlay">
                <div class="overlay-card">
                    <h2 id="overlayTitle">Connecting…</h2>
                    <p id="overlayBody">Authenticating with the soundboard.</p>
                </div>
            </div>
        </div>
        <div class="status-line">
            <span class="sync-pill is-idle" id="statusState">—</span>
            <span class="sep">·</span>
            <span id="statusViewers">0 viewers</span>
            <span class="viewer-pills" id="viewerPills"></span>
            <span class="sep">·</span>
            <span id="statusSource">source: ?</span>
        </div>
    </div>
    <div id="toast" class="toast"></div>

<script>
(function() {
    const m = window.location.pathname.match(/^\/watch\/(w_[a-f0-9]{8})$/i);
    if (!m) { document.getElementById('watchTitle').textContent = 'Invalid room URL'; return; }
    const ROOM_ID = m[1];
    const STAGE = document.getElementById('watchStage');
    const OVERLAY = document.getElementById('watchOverlay');
    const TITLE = document.getElementById('overlayTitle');
    const BODY = document.getElementById('overlayBody');
    const CONTROLS = document.getElementById('watchControls');
    const ROLE_BADGE = document.getElementById('watchRoleBadge');
    const STATUS_STATE = document.getElementById('statusState');
    const STATUS_VIEWERS = document.getElementById('statusViewers');
    const VIEWER_PILLS = document.getElementById('viewerPills');
    const STATUS_SOURCE = document.getElementById('statusSource');
    const TOAST = document.getElementById('toast');

    let room = null;
    let me = null;
    let isHost = false;
    function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function renderViewerPills(list) {
        if (!VIEWER_PILLS) return;
        if (!Array.isArray(list) || list.length === 0) { VIEWER_PILLS.innerHTML = ''; return; }
        // Sort host first, then by role (superadmin/admin/user/guest), then alpha.
        const roleOrder = { superadmin: 0, admin: 1, user: 2, guest: 3 };
        const hostUn = room && room.hostUsername;
        const sorted = [...list].sort((a, b) => {
            const ah = a.username === hostUn ? 0 : 1;
            const bh = b.username === hostUn ? 0 : 1;
            if (ah !== bh) return ah - bh;
            const ar = (roleOrder[a.role] ?? 9), br = (roleOrder[b.role] ?? 9);
            if (ar !== br) return ar - br;
            return String(a.username || '').localeCompare(String(b.username || ''));
        });
        VIEWER_PILLS.innerHTML = sorted.map(u => {
            const roleClass = ' role-' + (u.role || 'user');
            const hostClass = (u.username === hostUn) ? ' is-host' : '';
            const meClass = (u.username === me) ? ' is-me' : '';
            const label = u.role === 'guest' ? 'Guest' : (u.username || u.role);
            const title = u.username === hostUn ? 'Host' : (u.role || '');
            return '<span class="viewer-pill' + roleClass + hostClass + meClass + '" title="' + escapeHtml(title) + '"><span class="vp-dot"></span>' + escapeHtml(label) + '</span>';
        }).join('');
    }
    let player = null;          // generic player handle (varies by sourceType)
    let videoEl = null;         // when sourceType === 'video'
    let suppressEvents = false; // skip re-broadcasting events we're applying remotely
    let ws = null;

    function showToast(msg, ms) {
        TOAST.textContent = msg;
        TOAST.classList.add('visible');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => TOAST.classList.remove('visible'), ms || 2000);
    }
    function showOverlay(title, body) {
        TITLE.textContent = title;
        BODY.innerHTML = body || '';
        OVERLAY.classList.remove('hidden');
    }
    function hideOverlay() { OVERLAY.classList.add('hidden'); }
    function fmtTime(s) {
        s = Math.max(0, Math.round(s || 0));
        const m = Math.floor(s / 60); const ss = s - m * 60;
        return m + ':' + (ss < 10 ? '0' : '') + ss;
    }

    async function init() {
        let res;
        try { res = await fetch('/api/watch/rooms/' + ROOM_ID, { credentials: 'same-origin' }); }
        catch (e) { showOverlay('Cannot reach the soundboard', '<p>' + e.message + '</p>'); return; }
        if (res.status === 401) { showOverlay('Sign in required', '<p>Open the soundboard and log in, then refresh this page.</p>'); return; }
        if (res.status === 403) { showOverlay('Watch Together is disabled for your account', '<p>Ask a superadmin.</p>'); return; }
        if (res.status === 404) { showOverlay('Room not found or expired', '<p>The host may have closed it.</p>'); return; }
        if (!res.ok) { showOverlay('Failed to load room', '<p>HTTP ' + res.status + '</p>'); return; }
        room = await res.json();
        document.getElementById('watchTitle').textContent = room.url;
        document.getElementById('watchMeta').textContent = 'host: ' + room.hostUsername;
        STATUS_SOURCE.textContent = 'source: ' + room.sourceType;
        renderPlayer();
        connectWs();
    }

    function connectWs() {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + window.location.host + '/api/watch/rooms/' + ROOM_ID + '/socket');
        ws.onmessage = (evt) => {
            let msg; try { msg = JSON.parse(evt.data); } catch { return; }
            if (msg.type === 'hello') {
                me = msg.you;
                const trueHost = (me === room.hostUsername);
                const isSuperadmin = msg.yourRole === 'superadmin';
                // Superadmin gets the host UI in any room (so they can drive
                // playback / Pick another / close as operator).
                isHost = trueHost || isSuperadmin;
                CONTROLS.classList.toggle('hidden', !isHost);
                if (trueHost) {
                    ROLE_BADGE.textContent = 'Host';
                    ROLE_BADGE.className = 'watch-badge host';
                } else if (isSuperadmin) {
                    ROLE_BADGE.textContent = 'Superadmin';
                    ROLE_BADGE.className = 'watch-badge host';
                    ROLE_BADGE.title = 'You\'re using host controls as a superadmin override.';
                } else {
                    ROLE_BADGE.textContent = 'Viewer';
                    ROLE_BADGE.className = 'watch-badge viewer';
                    ROLE_BADGE.title = '';
                }
                applyState(msg.room.state);
            } else if (msg.type === 'state') {
                applyState(msg.state);
            } else if (msg.type === 'host-pos') {
                // Iframe-mode position beacon from the host. Just surface it
                // on the status line so viewers can manually scrub to match.
                STATUS_STATE.className = 'sync-pill is-warning';
                STATUS_STATE.textContent = '⏱ Host at ' + fmtTime(msg.position) + ' (manual sync)';
                showToast('Host is at ' + fmtTime(msg.position) + ' — scrub your player to match.', 3500);
            } else if (msg.type === 'viewers') {
                STATUS_VIEWERS.textContent = msg.count + ' viewer' + (msg.count === 1 ? '' : 's');
                renderViewerPills(msg.list || []);
            } else if (msg.type === 'closed') {
                showOverlay('Room closed', '<p>The host has ended this watch party.</p>');
                CONTROLS.classList.add('hidden');
            }
        };
        ws.onclose = () => { setTimeout(connectWs, 2000); };
        ws.onerror = () => {};
    }

    function applyState(state) {
        if (!state || !player) return;
        const syncLimited = room.sourceType === 'iframe';
        STATUS_STATE.className = 'sync-pill ' + (syncLimited ? 'is-warning' : (state.playing ? 'is-live' : 'is-idle'));
        STATUS_STATE.textContent = (state.playing ? (syncLimited ? 'MANUAL / sync limited' : 'LIVE / in sync') : 'PAUSED') + ' · ' + fmtTime(state.position);
        suppressEvents = true;
        try {
            if (player.kind === 'youtube') {
                const cur = player.api.getCurrentTime ? player.api.getCurrentTime() : 0;
                if (Math.abs(cur - state.position) > 1.5) player.api.seekTo(state.position, true);
                if (state.playing) player.api.playVideo();
                else player.api.pauseVideo();
            } else if (player.kind === 'video') {
                if (Math.abs(videoEl.currentTime - state.position) > 1.0) videoEl.currentTime = state.position;
                if (state.playing && videoEl.paused) videoEl.play().catch(() => {});
                else if (!state.playing && !videoEl.paused) videoEl.pause();
            } else if (player.kind === 'vimeo') {
                // Vimeo's getCurrentTime is async; we just trust the broadcast
                // and seek unconditionally (debounced by suppressEvents).
                player.vp.setCurrentTime(state.position).catch(() => {});
                if (state.playing) player.vp.play().catch(() => {});
                else player.vp.pause().catch(() => {});
            } else if (player.kind === 'twitch') {
                if (!player.isLive && typeof player.tw.seek === 'function') player.tw.seek(state.position);
                if (state.playing) player.tw.play(); else player.tw.pause();
            } else if (player.kind === 'iframe') {
                // No programmatic control — just nudge the user.
                if (state.playing) hideOverlay();
                else showOverlay('Host paused', '<p>Press play in the embedded player when the host resumes.</p>');
            }
        } catch {}
        setTimeout(() => { suppressEvents = false; }, 200);
    }

    function renderPlayer() {
        STAGE.innerHTML = '';
        STAGE.appendChild(OVERLAY);
        if (room.sourceType === 'youtube') return renderYouTube();
        if (room.sourceType === 'video')   return renderVideo();
        if (room.sourceType === 'vimeo')   return renderVimeo();
        if (room.sourceType === 'twitch')  return renderTwitch();
        if (room.sourceType === 'iframe')  return renderIframe();
        showOverlay('Unsupported source', '<p>' + room.sourceType + '</p>');
    }

    function renderYouTube() {
        const div = document.createElement('div');
        div.id = '__ytplayer';
        div.style.width = '100%'; div.style.height = '100%';
        STAGE.appendChild(div);
        STAGE.appendChild(OVERLAY);
        const load = () => {
            // eslint-disable-next-line no-undef
            const api = new YT.Player('__ytplayer', {
                width: '100%', height: '100%',
                // youtube-nocookie.com is YT's "privacy-enhanced mode" — the
                // embed doesn't drop tracking cookies and dodges the "Sign in
                // to confirm you're not a bot" wall that the default embed
                // started showing viewers in late 2025. `origin` makes the
                // Player API drop messages from any other origin.
                host: 'https://www.youtube-nocookie.com',
                videoId: room.sourceMeta.videoId,
                playerVars: { enablejsapi: 1, modestbranding: 1, rel: 0, playsinline: 1, origin: window.location.origin },
                events: {
                    onReady: () => { hideOverlay(); player = { kind: 'youtube', api }; if (room.state) applyState(room.state); },
                    onStateChange: (e) => {
                        if (suppressEvents || !isHost) return;
                        // YT.PlayerState.PLAYING=1, PAUSED=2
                        if (e.data === 1) sendControl('play', api.getCurrentTime());
                        else if (e.data === 2) sendControl('pause', api.getCurrentTime());
                    },
                },
            });
        };
        if (window.YT && window.YT.Player) load();
        else {
            const s = document.createElement('script');
            s.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(s);
            window.onYouTubeIframeAPIReady = load;
        }
    }

    function renderVideo() {
        const v = document.createElement('video');
        v.controls = isHost;
        v.preload = 'metadata';
        v.crossOrigin = 'anonymous';
        STAGE.appendChild(v);
        STAGE.appendChild(OVERLAY);
        videoEl = v; player = { kind: 'video' };
        v.addEventListener('loadedmetadata', () => { hideOverlay(); if (room.state) applyState(room.state); });
        v.addEventListener('play', () => { if (!suppressEvents && isHost) sendControl('play', v.currentTime); });
        v.addEventListener('pause', () => { if (!suppressEvents && isHost) sendControl('pause', v.currentTime); });
        v.addEventListener('seeked', () => { if (!suppressEvents && isHost) sendControl('seek', v.currentTime); });
        v.addEventListener('error', () => {
            const via = room.sourceMeta && room.sourceMeta.via;
            const hint = via === 'ytdlp' || via === 'ytdlp-unwrap'
                ? '<p>yt-dlp resolved a CDN URL but its signed params are tied to the server\'s IP/UA, so your browser can\'t play it. Hit <strong>Pick another</strong> above to recreate the room — auto-mode now prefers iframe sync for sources like this.</p>'
                : '<p>The browser couldn\'t play this stream. Try <strong>Pick another</strong> to recreate the room, or have a superadmin change <em>Watch Party → Sync strategy</em>.</p>';
            showOverlay('Playback failed', hint);
        });

        const src = room.sourceMeta.url;
        const isHls = /\.m3u8(\?|$)/i.test(src);
        // Safari (incl. iOS) plays HLS natively. Everywhere else needs hls.js
        // because <video> can't decode the manifest.
        const nativeHls = v.canPlayType('application/vnd.apple.mpegurl') !== '';
        if (isHls && !nativeHls) {
            const start = () => {
                // eslint-disable-next-line no-undef
                if (!window.Hls || !Hls.isSupported()) { showOverlay('HLS not supported', '<p>This browser can\'t play HLS streams.</p>'); return; }
                // eslint-disable-next-line no-undef
                const hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                hls.attachMedia(v);
                hls.loadSource(src);
                v._hls = hls;
            };
            if (window.Hls) start();
            else {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
                s.onload = start;
                s.onerror = () => showOverlay('Couldn\'t load HLS player', '<p>Failed to fetch hls.js from CDN. Check the network tab.</p>');
                document.head.appendChild(s);
            }
        } else {
            v.src = src;
        }
    }

    // For iframe sources we can't programmatically drive (weflix etc.), the
    // host can hit "I'm at <time>" to broadcast their current timestamp so
    // viewers see "Host is at 1:24:33" and scrub their own player to match.
    // The "Auto" toggle re-pushes the same value every 10s so viewers drifting
    // mid-watch get a fresh nudge without the host clicking each time.
    let _hostPosPrompt = null;
    let _hostPosAutoTimer = null;
    const HOST_POS_AUTO_INTERVAL_MS = 10_000;
    async function _hostPosBroadcastSecs(secs) {
        try {
            await fetch('/api/watch/rooms/' + ROOM_ID + '/host-position', {
                method: 'POST', credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ position: secs }),
            });
        } catch (e) { /* server may be momentarily flaky; auto-loop will retry */ }
    }
    function showHostPosControl() {
        if (_hostPosPrompt || !isHost) return;
        const wrap = document.createElement('div');
        wrap.style.cssText = 'position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:0.5rem; align-items:center; background:rgba(0,0,0,0.75); border:1px solid var(--accent); padding:0.4rem 0.6rem; border-radius:8px; flex-wrap:wrap; max-width: 95%;';
        wrap.innerHTML = '<span style="font-size:0.78rem; color:#e4e4e7;">Tell viewers your time:</span>'
            + '<input type="text" id="_hostPosIn" placeholder="1:24:33" style="width:90px; padding:0.3rem; background:#0f0f12; border:1px solid var(--border); border-radius:4px; color:#e4e4e7; font:inherit;">'
            + '<button class="btn primary" id="_hostPosBtn" style="padding:0.3rem 0.6rem; font-size:0.8rem;">Broadcast</button>'
            + '<label style="font-size:0.74rem; color:#e4e4e7; display:flex; align-items:center; gap:0.3rem; cursor:pointer;" title="Re-broadcast this time every 10s so late-joiners + drifted viewers get a nudge.">'
            +   '<input type="checkbox" id="_hostPosAuto"> Auto (every 10s)</label>'
            + '<span id="_hostPosAutoStatus" style="font-size:0.7rem; color:#a3a3a3; min-width:5rem;"></span>';
        STAGE.appendChild(wrap);
        _hostPosPrompt = wrap;
        const input = wrap.querySelector('#_hostPosIn');
        const autoBox = wrap.querySelector('#_hostPosAuto');
        const status = wrap.querySelector('#_hostPosAutoStatus');
        function parseSecs() {
            const v = input.value.trim();
            const parts = v.split(':').map(Number);
            let secs = 0;
            if (parts.length === 1) secs = parts[0];
            else if (parts.length === 2) secs = parts[0] * 60 + parts[1];
            else if (parts.length === 3) secs = parts[0] * 3600 + parts[1] * 60 + parts[2];
            return Number.isFinite(secs) && secs >= 0 ? secs : null;
        }
        wrap.querySelector('#_hostPosBtn').addEventListener('click', async () => {
            const secs = parseSecs();
            if (secs == null) { showToast('Enter time like 1:24:33 or 1500'); return; }
            await _hostPosBroadcastSecs(secs);
            showToast('Broadcast: ' + fmtTime(secs));
        });
        autoBox.addEventListener('change', () => {
            if (_hostPosAutoTimer) { clearInterval(_hostPosAutoTimer); _hostPosAutoTimer = null; status.textContent = ''; }
            if (autoBox.checked) {
                const tick = async () => {
                    const secs = parseSecs();
                    if (secs == null) {
                        status.textContent = 'enter time';
                        return;
                    }
                    await _hostPosBroadcastSecs(secs);
                    // Step the displayed time forward by the interval so the
                    // host doesn't have to keep typing — they can leave Auto
                    // running while they watch.
                    input.value = fmtTime(secs + Math.round(HOST_POS_AUTO_INTERVAL_MS / 1000));
                    status.textContent = '↻ ' + fmtTime(secs);
                };
                tick();
                _hostPosAutoTimer = setInterval(tick, HOST_POS_AUTO_INTERVAL_MS);
            }
        });
    }

    function renderIframe() {
        // Generic iframe sources we can't programmatically drive (weflix etc.)
        const src = room.sourceMeta && room.sourceMeta.url ? room.sourceMeta.url : room.url;
        const ifr = document.createElement('iframe');
        ifr.className = 'player-frame';
        ifr.src = src;
        ifr.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
        ifr.referrerPolicy = 'no-referrer';
        STAGE.appendChild(ifr);
        STAGE.appendChild(OVERLAY);
        player = { kind: 'iframe' };
        showOverlay('Click-to-start sync', '<p>This source\'s embedded player can\'t be driven from outside. Everyone plays in the iframe directly; the host can broadcast their current timestamp so viewers scrub to match.</p>');
        setTimeout(() => { if (player && player.kind === 'iframe') hideOverlay(); }, 8000);
        showHostPosControl();
    }

    // Vimeo Player API (player.js, postMessage-based). Same shape as the
    // YouTube path: hook play/pause/seek into the existing sync layer so
    // viewers stay in lockstep without per-host time-broadcast clicks.
    function renderVimeo() {
        const ifr = document.createElement('iframe');
        ifr.className = 'player-frame';
        ifr.src = 'https://player.vimeo.com/video/' + room.sourceMeta.videoId + '?api=1&player_id=__vimplayer';
        ifr.id = '__vimplayer';
        ifr.allow = 'autoplay; fullscreen; picture-in-picture';
        ifr.referrerPolicy = 'no-referrer';
        STAGE.appendChild(ifr);
        STAGE.appendChild(OVERLAY);
        showOverlay('Loading Vimeo…', '');
        const init = () => {
            if (!window.Vimeo || !window.Vimeo.Player) return;
            const vp = new window.Vimeo.Player(ifr);
            player = { kind: 'vimeo', api: {
                play: () => vp.play().catch(() => {}),
                pause: () => vp.pause().catch(() => {}),
                seekTo: (s) => vp.setCurrentTime(s).catch(() => {}),
                getCurrentTime: () => 0, // unused — vimeo's is async
            }, vp };
            vp.ready().then(() => {
                hideOverlay();
                if (room.state) applyState(room.state);
            });
            vp.on('play', () => {
                if (suppressEvents || !isHost) return;
                vp.getCurrentTime().then((t) => sendControl('play', t));
            });
            vp.on('pause', () => {
                if (suppressEvents || !isHost) return;
                vp.getCurrentTime().then((t) => sendControl('pause', t));
            });
            vp.on('seeked', (e) => {
                if (suppressEvents || !isHost) return;
                sendControl('seek', e.seconds);
            });
        };
        if (window.Vimeo && window.Vimeo.Player) init();
        else {
            const s = document.createElement('script');
            s.src = 'https://player.vimeo.com/api/player.js';
            s.onload = init;
            s.onerror = () => showOverlay('Vimeo API failed to load', '<p>Falling back to iframe-only mode.</p>');
            document.head.appendChild(s);
        }
    }

    // Twitch Player Embed API. Channels (live) don't have seekable
    // positions, so we still listen for play/pause but skip seek sync.
    function renderTwitch() {
        const div = document.createElement('div');
        div.id = '__twplayer';
        div.style.width = '100%'; div.style.height = '100%';
        STAGE.appendChild(div);
        STAGE.appendChild(OVERLAY);
        showOverlay('Loading Twitch…', '');
        const init = () => {
            if (!window.Twitch || !window.Twitch.Player) return;
            const opts = {
                width: '100%', height: '100%',
                parent: [window.location.hostname],
                autoplay: true,
            };
            if (room.sourceMeta.kind === 'video') opts.video = 'v' + room.sourceMeta.id;
            else opts.channel = room.sourceMeta.id;
            const tw = new window.Twitch.Player('__twplayer', opts);
            const isLive = room.sourceMeta.kind !== 'video';
            player = { kind: 'twitch', isLive, api: {
                play: () => tw.play(),
                pause: () => tw.pause(),
                seekTo: (s) => { if (!isLive && typeof tw.seek === 'function') tw.seek(s); },
                getCurrentTime: () => (typeof tw.getCurrentTime === 'function' ? tw.getCurrentTime() : 0),
            }, tw };
            tw.addEventListener(window.Twitch.Player.READY, () => {
                hideOverlay();
                if (room.state) applyState(room.state);
            });
            tw.addEventListener(window.Twitch.Player.PLAY, () => {
                if (suppressEvents || !isHost) return;
                sendControl('play', tw.getCurrentTime ? tw.getCurrentTime() : 0);
            });
            tw.addEventListener(window.Twitch.Player.PAUSE, () => {
                if (suppressEvents || !isHost) return;
                sendControl('pause', tw.getCurrentTime ? tw.getCurrentTime() : 0);
            });
        };
        if (window.Twitch && window.Twitch.Player) init();
        else {
            const s = document.createElement('script');
            s.src = 'https://player.twitch.tv/js/embed/v1.js';
            s.onload = init;
            s.onerror = () => showOverlay('Twitch API failed to load', '<p>Falling back to iframe-only mode.</p>');
            document.head.appendChild(s);
        }
    }

    async function sendControl(action, position) {
        if (!isHost) return;
        try {
            const res = await fetch('/api/watch/rooms/' + ROOM_ID + '/control', {
                method: 'POST', credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, position }),
            });
            if (!res.ok) showToast('Control failed: ' + res.status);
        } catch (e) { showToast(e.message); }
    }

    document.getElementById('btnPlay').addEventListener('click', () => {
        if (player && player.kind === 'youtube') player.api.playVideo();
        else if (player && player.kind === 'video') videoEl.play().catch(() => {});
        else sendControl('play', 0);
    });
    document.getElementById('btnPause').addEventListener('click', () => {
        if (player && player.kind === 'youtube') player.api.pauseVideo();
        else if (player && player.kind === 'video') videoEl.pause();
        else sendControl('pause', 0);
    });
    document.getElementById('btnSync').addEventListener('click', async () => {
        const r = await fetch('/api/watch/rooms/' + ROOM_ID, { credentials: 'same-origin' });
        if (!r.ok) return;
        const d = await r.json();
        applyState(d.state);
        showToast('Resynced.');
    });
    document.getElementById('btnClose').addEventListener('click', async () => {
        if (!confirm('Close this watch room for everyone?')) return;
        const r = await fetch('/api/watch/rooms/' + ROOM_ID, { method: 'DELETE', credentials: 'same-origin' });
        if (r.ok) showOverlay('Room closed', '<p>You\'ve ended this watch party.</p>');
    });
    // Pick-another: spin up a fresh /movienight room and redirect. Whoever
    // clicks it becomes the new Movie Night host; viewers can follow via WS
    // notification (next commit can pipe that through). Host-only.
    document.getElementById('btnPickAnother').addEventListener('click', async () => {
        if (!isHost) { showToast('Only the host can pick another'); return; }
        const r = await fetch('/api/movienight/rooms', { method: 'POST', credentials: 'same-origin' });
        if (!r.ok) { const d = await r.json().catch(() => ({})); showToast(d.error || 'Failed to start Movie Night'); return; }
        const data = await r.json();
        window.location.href = '/movienight/' + data.id;
    });

    init();
})();
</script>
</body>
</html>
